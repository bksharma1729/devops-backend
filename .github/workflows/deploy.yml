name: Docker Deployment

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Setup project directory on EC2
            if [ ! -d ~/devops-backend ]; then
              git clone https://github.com/kPratik07/devops-backend.git ~/devops-backend
            fi

            cd ~/devops-backend

            # 2. Update code and build the new image
            git pull origin main
            docker build -t backend-app .

            # 3. Stop old container and start the new one
            docker stop backend-container || true
            docker rm backend-container || true
            docker run -d -p 3000:3000 --name backend-container backend-app

            # 4. Verify the app is responding
            sleep 3
            curl -f http://localhost:3000

            # 5. Storage Maintenance
            docker image prune -f
